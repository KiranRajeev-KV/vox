<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vox History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626', 700: '#b91c1c' }
                    }
                }
            }
        }
    </script>
    <style>
        [v-cloak] { display: none; }
        .search-highlight { background: #fef08a; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body class="h-full bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors">
    <div id="app" class="min-h-full">
        <!-- Header -->
        <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                            </svg>
                        </div>
                        <h1 class="text-xl font-bold">Vox History</h1>
                    </div>
                    <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" aria-label="Toggle theme">
                        <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                        </svg>
                        <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <!-- Stats Cards -->
            <div id="statsCards" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white dark:bg-gray-900 rounded-xl p-5 border border-gray-200 dark:border-gray-800">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Sessions</p>
                    <p id="statSessions" class="text-2xl font-bold mt-1">—</p>
                </div>
                <div class="bg-white dark:bg-gray-900 rounded-xl p-5 border border-gray-200 dark:border-gray-800">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Words</p>
                    <p id="statWords" class="text-2xl font-bold mt-1">—</p>
                </div>
                <div class="bg-white dark:bg-gray-900 rounded-xl p-5 border border-gray-200 dark:border-gray-800">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Duration</p>
                    <p id="statDuration" class="text-2xl font-bold mt-1">—</p>
                </div>
                <div class="bg-white dark:bg-gray-900 rounded-xl p-5 border border-gray-200 dark:border-gray-800">
                    <p class="text-sm text-gray-500 dark:text-gray-400">Avg Latency</p>
                    <p id="statLatency" class="text-2xl font-bold mt-1">—</p>
                </div>
            </div>

            <!-- Search -->
            <div class="mb-6">
                <div class="relative">
                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                    <input id="searchInput" type="text" placeholder="Search transcriptions..."
                        class="w-full pl-10 pr-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition text-base placeholder:text-gray-400">
                </div>
                <p id="searchInfo" class="text-sm text-gray-500 dark:text-gray-400 mt-2 hidden"></p>
            </div>

            <!-- Sessions Table -->
            <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-800">
                            <tr>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400">Date</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400 w-1/3">Text</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400">Lang</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400">Words</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400">Latency</th>
                                <th class="text-left px-4 py-3 font-medium text-gray-500 dark:text-gray-400">App</th>
                            </tr>
                        </thead>
                        <tbody id="sessionsBody">
                            <tr><td colspan="6" class="px-4 py-12 text-center text-gray-500">Loading…</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div id="pagination" class="flex items-center justify-between px-4 py-3 border-t border-gray-200 dark:border-gray-800 hidden">
                    <p class="text-sm text-gray-500 dark:text-gray-400" id="pageInfo"></p>
                    <div class="flex gap-2">
                        <button id="prevPage" class="px-3 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed transition">Previous</button>
                        <button id="nextPage" class="px-3 py-1.5 text-sm rounded-lg border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed transition">Next</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Session Detail Modal -->
        <div id="modal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="closeModal()"></div>
            <div class="absolute inset-4 sm:inset-8 lg:inset-16 bg-white dark:bg-gray-900 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-800">
                    <h2 class="text-lg font-semibold">Session Details</h2>
                    <button onclick="closeModal()" class="p-1 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm">
                        <div><span class="text-gray-500 dark:text-gray-400">Date</span><p id="modalDate" class="font-medium mt-0.5"></p></div>
                        <div><span class="text-gray-500 dark:text-gray-400">Language</span><p id="modalLang" class="font-medium mt-0.5"></p></div>
                        <div><span class="text-gray-500 dark:text-gray-400">Words</span><p id="modalWords" class="font-medium mt-0.5"></p></div>
                        <div><span class="text-gray-500 dark:text-gray-400">App</span><p id="modalApp" class="font-medium mt-0.5"></p></div>
                    </div>
                    <div class="grid grid-cols-3 gap-4 text-sm">
                        <div><span class="text-gray-500 dark:text-gray-400">Audio Duration</span><p id="modalDuration" class="font-medium mt-0.5"></p></div>
                        <div><span class="text-gray-500 dark:text-gray-400">After VAD</span><p id="modalVadDuration" class="font-medium mt-0.5"></p></div>
                        <div><span class="text-gray-500 dark:text-gray-400">Transcription</span><p id="modalTranscribeLatency" class="font-medium mt-0.5"></p></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Raw Text</h3>
                        <div id="modalRawText" class="bg-gray-50 dark:bg-gray-800 rounded-lg p-4 text-sm whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                    <div>
                        <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-2">Cleaned Text</h3>
                        <div id="modalCleanText" class="bg-gray-50 dark:bg-gray-800 rounded-lg p-4 text-sm whitespace-pre-wrap leading-relaxed"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
// Theme
const html = document.documentElement;
const stored = localStorage.getItem('vox-theme');
if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) html.classList.add('dark');
function updateIcons() {
    document.getElementById('sunIcon').classList.toggle('hidden', !html.classList.contains('dark'));
    document.getElementById('moonIcon').classList.toggle('hidden', html.classList.contains('dark'));
}
updateIcons();
document.getElementById('themeToggle').addEventListener('click', () => {
    html.classList.toggle('dark');
    localStorage.setItem('vox-theme', html.classList.contains('dark') ? 'dark' : 'light');
    updateIcons();
});

// State
let currentPage = 1;
const perPage = 20;
let searchQuery = '';
let searchTimeout = null;

// Helpers
function fmtMs(ms) { return ms < 1000 ? `${ms}ms` : `${(ms/1000).toFixed(1)}s`; }
function fmtDuration(ms) {
    const s = Math.floor(ms / 1000);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60);
    if (m < 60) return `${m}m ${s % 60}s`;
    const h = Math.floor(m / 60);
    return `${h}h ${m % 60}m`;
}
function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso.replace(' ', 'T'));
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}
function langColor(lang) {
    const map = { en: 'bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-300', ml: 'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300', hi: 'bg-orange-100 text-orange-700 dark:bg-orange-900/40 dark:text-orange-300' };
    return map[lang] || 'bg-gray-100 text-gray-700 dark:bg-gray-800 dark:text-gray-300';
}

// Fetch stats
async function loadStats() {
    try {
        const r = await fetch('/api/stats');
        const d = await r.json();
        document.getElementById('statSessions').textContent = d.total_sessions.toLocaleString();
        document.getElementById('statWords').textContent = d.total_words.toLocaleString();
        document.getElementById('statDuration').textContent = fmtDuration(d.total_duration_ms);
        document.getElementById('statLatency').textContent = d.avg_latency_ms > 0 ? fmtMs(d.avg_latency_ms) : '—';
    } catch (e) { console.error('Stats failed', e); }
}

// Fetch sessions
async function loadSessions() {
    const body = document.getElementById('sessionsBody');
    body.innerHTML = '<tr><td colspan="6" class="px-4 py-12 text-center text-gray-500">Loading…</td></tr>';

    try {
        let url, data;
        if (searchQuery) {
            const r = await fetch(`/api/search?q=${encodeURIComponent(searchQuery)}&limit=100`);
            data = await r.json();
            document.getElementById('searchInfo').textContent = `${data.total} result${data.total !== 1 ? 's' : ''} for "${searchQuery}"`;
            document.getElementById('searchInfo').classList.remove('hidden');
            renderSessions(data.sessions);
            document.getElementById('pagination').classList.add('hidden');
        } else {
            const r = await fetch(`/api/sessions?page=${currentPage}&per_page=${perPage}`);
            data = await r.json();
            document.getElementById('searchInfo').classList.add('hidden');
            renderSessions(data.sessions);
            document.getElementById('pageInfo').textContent = `Page ${data.page} of ${data.total_pages} (${data.total} total)`;
            document.getElementById('prevPage').disabled = data.page <= 1;
            document.getElementById('nextPage').disabled = data.page >= data.total_pages;
            document.getElementById('pagination').classList.remove('hidden');
        }
    } catch (e) {
        body.innerHTML = '<tr><td colspan="6" class="px-4 py-12 text-center text-red-500">Failed to load sessions</td></tr>';
    }
}

function renderSessions(sessions) {
    const body = document.getElementById('sessionsBody');
    if (!sessions.length) {
        body.innerHTML = '<tr><td colspan="6" class="px-4 py-12 text-center text-gray-500">No sessions found</td></tr>';
        return;
    }
    body.innerHTML = sessions.map(s => `
        <tr class="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-800/50 cursor-pointer transition" onclick="openModal(${s.id})">
            <td class="px-4 py-3 whitespace-nowrap text-gray-500 dark:text-gray-400">${fmtDate(s.created_at)}</td>
            <td class="px-4 py-3 max-w-md truncate text-gray-700 dark:text-gray-300">${escapeHtml((s.clean_text || s.raw_text || '').substring(0, 120))}</td>
            <td class="px-4 py-3 whitespace-nowrap"><span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full ${langColor(s.language)}">${s.language}</span></td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-600 dark:text-gray-400">${s.word_count}</td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-600 dark:text-gray-400">${fmtMs(s.full_pipeline_latency_ms)}</td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-500 dark:text-gray-400 text-xs">${s.app_context || '—'}</td>
        </tr>
    `).join('');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Modal
async function openModal(id) {
    try {
        const r = await fetch(`/api/session/${id}`);
        const s = await r.json();
        document.getElementById('modalDate').textContent = fmtDate(s.created_at);
        document.getElementById('modalLang').innerHTML = `<span class="inline-flex px-2 py-0.5 text-xs font-medium rounded-full ${langColor(s.language)}">${s.language}</span>`;
        document.getElementById('modalWords').textContent = s.word_count;
        document.getElementById('modalApp').textContent = s.app_context || '—';
        document.getElementById('modalDuration').textContent = fmtDuration(s.duration_ms);
        document.getElementById('modalVadDuration').textContent = fmtDuration(s.duration_after_vad_ms);
        document.getElementById('modalTranscribeLatency').textContent = fmtMs(s.transcription_latency_ms);
        document.getElementById('modalRawText').textContent = s.raw_text;
        document.getElementById('modalCleanText').textContent = s.clean_text || '(no cleaned text)';
        document.getElementById('modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    } catch (e) { console.error('Failed to load session', e); }
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Search
document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        searchQuery = e.target.value.trim();
        currentPage = 1;
        loadSessions();
    }, 300);
});

// Pagination
document.getElementById('prevPage').addEventListener('click', () => { if (currentPage > 1) { currentPage--; loadSessions(); } });
document.getElementById('nextPage').addEventListener('click', () => { currentPage++; loadSessions(); });

// Init
loadStats();
loadSessions();
</script>
</body>
</html>
